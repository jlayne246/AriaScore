name: Android CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ariascore/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install dependencies
        working-directory: ariascore
        run: npm ci

      - name: TypeScript check
        working-directory: ariascore
        run: npx tsc --noEmit

      - name: Expo doctor
        working-directory: ariascore
        run: npx expo-doctor
        continue-on-error: true

      - name: Build Android debug APK
        working-directory: ariascore/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug